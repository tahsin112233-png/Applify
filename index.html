<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Applify</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Applify">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root {
      --accent: #fc3c44;
      --accent2: #ff6b6b;
      --bg: #000;
      --glass: rgba(255,255,255,.08);
      --glass-b: rgba(255,255,255,.12);
      --txt: #fff;
      --txt2: rgba(255,255,255,.55);
      --txt3: rgba(255,255,255,.25);
      --r: 14px;
      --r2: 22px;
      --mini-h: 78px;
      --tab-h: 74px;
      --sai: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overscroll-behavior:none}
    body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#000;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}
    *{scrollbar-width:none}*::-webkit-scrollbar{display:none}

    /* LOADING */
    #loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .7s}
    #loading.gone{opacity:0;pointer-events:none}
    .ld-icon{width:96px;height:96px;background:linear-gradient(145deg,#fc3c44,#ff2d55);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 70px rgba(252,60,68,.55);animation:ldp 1.9s ease-in-out infinite}
    @keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.07);box-shadow:0 0 100px rgba(252,60,68,.75)}}
    .ld-name{font-size:32px;font-weight:800;letter-spacing:-.8px}
    .ld-sub{font-size:13px;color:rgba(255,255,255,.5)}
    .ld-dots{display:flex;gap:7px;margin-top:8px}
    .ld-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bn .9s ease-in-out infinite}
    .ld-dot:nth-child(2){animation-delay:.15s}.ld-dot:nth-child(3){animation-delay:.3s}
    @keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

    /* APP SHELL */
    #app{width:100%;height:100dvh;position:relative}
    .view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--mini-h) + var(--tab-h) + var(--sab) + 18px);padding-top:var(--sai);display:none}
    .view.active{display:block}

    /* PAGE HEADERS */
    .phdr{padding:14px 20px 8px;position:sticky;top:0;z-index:20;backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);background:rgba(0,0,0,.55)}
    .ptitle{font-size:34px;font-weight:800;letter-spacing:-.8px}

    /* HOME HEADER */
    .home-hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:14px 20px 10px;position:sticky;top:0;z-index:20;backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);background:rgba(0,0,0,.55)}
    .greet{font-size:34px;font-weight:800;letter-spacing:-.8px}
    .region-btn{display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;transition:background .15s;-webkit-appearance:none;outline:none}
    .region-btn:active{background:rgba(255,255,255,.15)}

    /* SECTIONS */
    .sec{margin-top:26px}
    .sec-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px 12px}
    .sec-ttl{font-size:21px;font-weight:700;letter-spacing:-.3px}
    .sec-all{font-size:14px;color:var(--accent);font-weight:500;cursor:pointer}

    /* H-SCROLL */
    .hs{display:flex;gap:13px;padding:4px 20px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}

    /* HERO CARD */
    .hero{margin:8px 16px 0;border-radius:var(--r2);overflow:hidden;position:relative;height:220px;cursor:pointer;background:linear-gradient(135deg,#1a1a2e,#16213e);box-shadow:0 8px 40px rgba(0,0,0,.55)}
    .hero img{width:100%;height:100%;object-fit:cover;opacity:.7;transition:opacity .3s}
    .hero:active img{opacity:.5}
    .hero-body{position:absolute;bottom:0;left:0;right:0;padding:18px;background:linear-gradient(to top,rgba(0,0,0,.92),transparent)}
    .hero-lbl{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:4px}
    .hero-ttl{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
    .hero-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
    .hero-play{position:absolute;top:14px;right:14px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center}

    /* SONG CARD */
    .scard{flex-shrink:0;width:150px;cursor:pointer;scroll-snap-align:start;transition:transform .15s,opacity .15s}
    .scard:active{transform:scale(.93);opacity:.8}
    .scard-art{width:150px;height:150px;border-radius:var(--r);overflow:hidden;background:#1c1c1e;margin-bottom:8px;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .scard-art img{width:100%;height:100%;object-fit:cover;display:block}
    .scard-ov{position:absolute;inset:0;background:rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
    .scard:active .scard-ov{opacity:1}
    .scard-ttl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .scard-sub{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

    /* QUICK PICKS 2-COL */
    .qp-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:0 14px}
    .qp{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:10px;padding:8px;cursor:pointer;margin:2px;transition:background .15s}
    .qp:active{background:rgba(255,255,255,.1)}
    .qp-img{width:50px;height:50px;border-radius:8px;overflow:hidden;background:#2c2c2e;flex-shrink:0}
    .qp-img img{width:100%;height:100%;object-fit:cover}
    .qp-name{font-size:12.5px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

    /* LIST ITEM */
    .li{display:flex;align-items:center;gap:13px;padding:9px 20px;cursor:pointer;transition:background .15s}
    .li:active{background:rgba(255,255,255,.06)}
    .li-num{width:22px;text-align:center;font-size:15px;font-weight:600;color:var(--txt2);flex-shrink:0}
    .li-img{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#1c1c1e;flex-shrink:0}
    .li-img img{width:100%;height:100%;object-fit:cover}
    .li-info{flex:1;min-width:0}
    .li-ttl{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .li-sub{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .li-more{color:var(--txt3);padding:6px;flex-shrink:0}

    /* SEARCH */
    .s-wrap{padding:0 16px 14px;position:sticky;top:calc(56px + var(--sai));z-index:18;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px)}
    .s-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border:1px solid var(--glass-b);border-radius:13px;padding:11px 14px}
    .s-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:16px;font-family:inherit}
    .s-bar input::placeholder{color:var(--txt2)}
    .s-clr{color:var(--txt2);cursor:pointer;display:none;flex-shrink:0}
    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:4px 16px 20px}
    .cat{height:96px;border-radius:14px;padding:12px 14px;font-size:16px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:flex-end;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .cat:active{transform:scale(.95)}
    .cat-em{position:absolute;top:10px;right:12px;font-size:30px}

    /* MINI PLAYER */
    #mini{position:fixed;bottom:calc(var(--tab-h) + var(--sab) + 8px);left:12px;right:12px;height:var(--mini-h);background:rgba(28,28,30,.9);backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);border-radius:20px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:10px 12px;gap:12px;z-index:70;cursor:pointer;transform:translateY(200px);transition:transform .45s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 50px rgba(0,0,0,.7)}
    #mini.show{transform:translateY(0)}
    .mini-art{width:56px;height:56px;border-radius:12px;overflow:hidden;background:#2c2c2e;flex-shrink:0}
    .mini-art img{width:100%;height:100%;object-fit:cover}
    .mini-info{flex:1;min-width:0}
    .mini-ttl{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mini-art2{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .mini-btns{display:flex;align-items:center}
    .cb{width:40px;height:40px;border:none;background:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background .15s;-webkit-appearance:none}
    .cb:active{background:rgba(255,255,255,.12)}
    .mini-pb{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);border-radius:0 0 20px 20px;overflow:hidden}
    .mini-pb-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s linear}

    /* NOW PLAYING */
    #np{position:fixed;inset:0;z-index:90;transform:translateY(100%);transition:transform .5s cubic-bezier(.32,.72,0,1)}
    #np.open{transform:translateY(0)}
    .np-bg{position:absolute;inset:0;background:#0d0808;overflow:hidden}
    .np-blur{position:absolute;inset:-80px;background-size:cover;background-position:center;filter:blur(90px) brightness(.28) saturate(3.5);transform:scale(1.4);transition:background-image .8s ease}
    .np-ov{position:absolute;inset:0;background:rgba(0,0,0,.3)}
    .np-in{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding-top:var(--sai);padding-bottom:var(--sab)}

    .np-drag{display:flex;justify-content:center;padding:14px 0 6px;cursor:pointer}
    .np-handle{width:40px;height:4px;background:rgba(255,255,255,.3);border-radius:2px}
    .np-top{display:flex;align-items:center;padding:4px 18px 10px}
    .np-ctx{flex:1;text-align:center}
    .np-ctx-lbl{font-size:10.5px;color:rgba(255,255,255,.55);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
    .np-ctx-nm{font-size:14px;font-weight:700;margin-top:1px}
    .npib{width:38px;height:38px;border-radius:50%;background:none;border:none;color:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;transition:background .15s}
    .npib:active{background:rgba(255,255,255,.12)}

    /* ART */
    .np-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 32px;min-height:0}
    .np-art{width:100%;max-width:340px;aspect-ratio:1;border-radius:22px;overflow:hidden;background:#2c2c2e;box-shadow:0 30px 90px rgba(0,0,0,.75);transform:scale(.91);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
    .np-art.big{transform:scale(1)}
    .np-art img{width:100%;height:100%;object-fit:cover;display:block}

    .np-meta{padding:18px 26px 8px;display:flex;align-items:center;gap:14px}
    .np-meta-txt{flex:1;min-width:0}
    .np-song{font-size:23px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-artist{font-size:16px;color:rgba(255,255,255,.6);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-heart{width:40px;height:40px;border:none;background:none;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .25s,color .2s;-webkit-appearance:none;flex-shrink:0}
    .np-heart.on{color:var(--accent);transform:scale(1.2)}

    .np-pw{padding:2px 26px 0}
    .np-prog{height:4px;background:rgba(255,255,255,.2);border-radius:4px;cursor:pointer;position:relative;touch-action:none}
    .np-fill{height:100%;background:#fff;width:0;border-radius:4px;pointer-events:none;transition:width .5s linear}
    .np-knob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:50%;transform:translate(50%,-50%);right:0;box-shadow:0 1px 6px rgba(0,0,0,.4);pointer-events:none}
    .np-times{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px}

    .np-ctrl{display:flex;align-items:center;justify-content:space-evenly;padding:14px 16px}
    .npc{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:opacity .15s;-webkit-appearance:none}
    .npc:active{opacity:.5}
    .npc.sm{width:46px;height:46px;color:rgba(255,255,255,.65)}
    .npc.md{width:58px;height:58px}
    .npc.play-btn{width:78px;height:78px;background:rgba(255,255,255,.14);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.22)}
    .npc.on{color:var(--accent) !important}

    .np-vol{display:flex;align-items:center;gap:11px;padding:0 26px 16px}
    .np-vol svg{color:var(--txt2);flex-shrink:0}
    .np-vol input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,.2);border-radius:4px;cursor:pointer;outline:none}
    .np-vol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.4)}

    /* LYRICS PANEL */
    #np-lyrics-panel{margin:0 26px 14px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:14px 16px;max-height:110px;overflow-y:auto;display:none}
    .lrc-line{font-size:15px;font-weight:500;line-height:1.7;color:rgba(255,255,255,.45);transition:color .3s,font-size .3s}
    .lrc-line.active{color:#fff;font-size:16.5px;font-weight:700}
    .lrc-empty{font-size:14px;color:rgba(255,255,255,.4);text-align:center;padding:6px 0}

    /* CROSSFADE INDICATOR */
    #xfade-bar{position:fixed;top:calc(var(--sai) + 10px);left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(28,28,30,.94);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);color:#fff;padding:9px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
    #xfade-bar.in{transform:translateX(-50%) translateY(0)}

    /* SETTINGS */
    .s-sect{margin-bottom:6px}
    .s-sect-ttl{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:18px 20px 8px}
    .s-grp{margin:0 16px;border-radius:16px;background:rgba(255,255,255,.05);overflow:hidden}
    .s-row{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
    .s-row:last-child{border-bottom:none}
    .s-row:active{background:rgba(255,255,255,.06)}
    .s-ico{font-size:20px;width:30px;text-align:center;flex-shrink:0}
    .s-inf{flex:1}
    .s-lbl{font-size:15px;font-weight:500}
    .s-val{font-size:12px;color:var(--txt2);margin-top:2px}
    .s-arr{color:var(--txt3);font-size:18px}
    .tog{width:50px;height:30px;border-radius:15px;background:#3a3a3c;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;border:none;-webkit-appearance:none}
    .tog::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:12px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
    .tog.on{background:#2196F3}
    .tog.on::after{transform:translateX(20px)}

    /* LIBRARY */
    .lib-empty{padding:60px 28px;text-align:center;color:var(--txt2)}
    .lib-ico{font-size:60px;margin-bottom:18px}

    /* SHEET / MODAL */
    .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
    .sheet-ov.open{opacity:1;pointer-events:all}
    .sheet{background:#1c1c1e;border-radius:22px 22px 0 0;padding:0 0 calc(var(--sab) + 16px);width:100%;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
    .sheet-ov.open .sheet{transform:translateY(0)}
    .sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;margin:14px auto 0}
    .sheet-ttl{font-size:18px;font-weight:700;padding:16px 20px 10px}
    .sheet-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;border-radius:12px;margin:0 8px}
    .sheet-item:active{background:rgba(255,255,255,.08)}
    .sheet-item.sel{color:var(--accent)}
    .sheet-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sheet-dot.on{border-color:var(--accent);background:var(--accent)}

    /* TOAST */
    #toast{position:fixed;top:calc(var(--sai) + 14px);left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(28,28,30,.95);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:400;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    #toast.in{transform:translateX(-50%) translateY(0)}

    /* TAB BAR */
    #tabs{position:fixed;bottom:var(--sab);left:12px;right:12px;height:var(--tab-h);background:rgba(18,18,18,.84);backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);border-radius:26px;border:1px solid rgba(255,255,255,.09);display:flex;align-items:center;justify-content:space-around;z-index:75;box-shadow:0 4px 30px rgba(0,0,0,.6)}
    .tab{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:none;background:none;color:var(--txt2);font-size:10.5px;font-weight:600;font-family:inherit;cursor:pointer;border-radius:26px;letter-spacing:.2px;transition:color .2s;-webkit-appearance:none}
    .tab.on{color:var(--accent)}
    .tab svg{width:26px;height:26px}

    /* SKEL */
    .sk{background:linear-gradient(90deg,#1c1c1e 25%,#2c2c2e 50%,#1c1c1e 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:10px}
    @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

    @media(min-width:520px){
      #mini,#tabs{max-width:500px;left:50%;right:auto;transform:translateX(-50%)}
      #mini.show{transform:translate(-50%,0)}
    }
  </style>
</head>
<body>
<div id="app">

<!-- LOADING -->
<div id="loading">
  <div class="ld-icon">🎵</div>
  <div class="ld-name">Applify</div>
  <div class="ld-sub">Powered by YouTube Music</div>
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
</div>

<!-- TOAST -->
<div id="toast"></div>
<!-- CROSSFADE INDICATOR -->
<div id="xfade-bar">🎛️ Crossfade</div>

<!-- ══ HOME ══ -->
<div id="v-home" class="view active">
  <div class="home-hdr">
    <div class="greet" id="greet">Good Evening</div>
    <button class="region-btn" id="region-btn" onclick="openRegion()">
      <span id="region-flag">🌏</span>
      <span id="region-label">BD</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
  <div id="home-body"></div>
</div>

<!-- ══ SEARCH ══ -->
<div id="v-search" class="view">
  <div class="phdr"><div class="ptitle">Search</div></div>
  <div class="s-wrap">
    <div class="s-bar">

<script>
/* ═══════════════════════════════════════════
   APPLIFY v2 — Complete Music PWA
   ═══════════════════════════════════════════ */

// ── STATE ──
const audio    = new Audio();
audio.crossOrigin = 'anonymous';

let curTrack   = null;
let queue      = [];
let qIdx       = -1;
let isPlaying  = false;
let isShuffle  = false;
let isRepeat   = false;
let showLyrics = false;
let lrcLines   = [];
let xfadeTimer = null;

// ── SETTINGS ──
const S = {
  region:       localStorage.getItem('ap_region')      || 'BD',
  crossfade:    localStorage.getItem('ap_xfade')       !== 'false',
  xfadeDur:     parseInt(localStorage.getItem('ap_xfade_dur') || '5'),
  djStyle:      localStorage.getItem('ap_dj')          !== 'false',
  quality:      localStorage.getItem('ap_quality')     || 'medium',
  blurBg:       localStorage.getItem('ap_blur')        !== 'false',
  sponsorBlock: localStorage.getItem('ap_sb')          === 'true',
};
const liked  = new Set(JSON.parse(localStorage.getItem('ap_liked')  || '[]'));
let   recent = JSON.parse(localStorage.getItem('ap_recent') || '[]');

// ── REGIONS ──
const REGIONS = [
  { code:'BD', flag:'🇧🇩', name:'Bangladesh' },
  { code:'IN', flag:'🇮🇳', name:'India' },
  { code:'US', flag:'🇺🇸', name:'United States' },
  { code:'GB', flag:'🇬🇧', name:'United Kingdom' },
  { code:'PK', flag:'🇵🇰', name:'Pakistan' },
  { code:'NG', flag:'🇳🇬', name:'Nigeria' },
  { code:'BR', flag:'🇧🇷', name:'Brazil' },
  { code:'JP', flag:'🇯🇵', name:'Japan' },
  { code:'KR', flag:'🇰🇷', name:'South Korea' },
  { code:'DE', flag:'🇩🇪', name:'Germany' },
  { code:'FR', flag:'🇫🇷', name:'France' },
  { code:'CA', flag:'🇨🇦', name:'Canada' },
  { code:'AU', flag:'🇦🇺', name:'Australia' },
  { code:'MX', flag:'🇲🇽', name:'Mexico' },
  { code:'AE', flag:'🇦🇪', name:'UAE' },
];

// ── DEMO TRACKS ──
const DEMOS = [
  { id:'dQw4w9WgXcQ', title:'Never Gonna Give You Up', artist:'Rick Astley',     thumb:'https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg' },
  { id:'JGwWNGJdvx8', title:'Shape of You',            artist:'Ed Sheeran',      thumb:'https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg' },
  { id:'kJQP7kiw5Fk', title:'Despacito',               artist:'Luis Fonsi',      thumb:'https://img.youtube.com/vi/kJQP7kiw5Fk/maxresdefault.jpg' },
  { id:'OPf0YbXqDm0', title:'Uptown Funk',             artist:'Bruno Mars',      thumb:'https://img.youtube.com/vi/OPf0YbXqDm0/maxresdefault.jpg' },
  { id:'hT_nvWreIhg', title:'Counting Stars',          artist:'OneRepublic',     thumb:'https://img.youtube.com/vi/hT_nvWreIhg/maxresdefault.jpg' },
  { id:'09R8_2nJtjg', title:'Sugar',                   artist:'Maroon 5',        thumb:'https://img.youtube.com/vi/09R8_2nJtjg/maxresdefault.jpg' },
  { id:'CevxZvSJLk8', title:'Roar',                    artist:'Katy Perry',      thumb:'https://img.youtube.com/vi/CevxZvSJLk8/maxresdefault.jpg' },
  { id:'nfWlot6h_JM', title:'Shake It Off',            artist:'Taylor Swift',    thumb:'https://img.youtube.com/vi/nfWlot6h_JM/maxresdefault.jpg' },
  { id:'YqeW9_5kURI', title:'See You Again',           artist:'Wiz Khalifa',     thumb:'https://img.youtube.com/vi/YqeW9_5kURI/maxresdefault.jpg' },
  { id:'ru0K8uLcF7w', title:'Faded',                   artist:'Alan Walker',     thumb:'https://img.youtube.com/vi/ru0K8uLcF7w/maxresdefault.jpg' },
  { id:'bM7SZ5SBzyY', title:'Believer',                artist:'Imagine Dragons', thumb:'https://img.youtube.com/vi/bM7SZ5SBzyY/maxresdefault.jpg' },
  { id:'450p7goxZqg', title:'Stay With Me',            artist:'Sam Smith',       thumb:'https://img.youtube.com/vi/450p7goxZqg/maxresdefault.jpg' },
];

const CATS = [
  { n:'Music',        c:'#fc3c44', e:'🎵' },
  { n:'Trending',     c:'#ff9f0a', e:'📈' },
  { n:'Hip-Hop',      c:'#5856d6', e:'🎤' },
  { n:'Pop',          c:'#30d158', e:'✨' },
  { n:'Rock',         c:'#ff375f', e:'🎸' },
  { n:'Electronic',   c:'#0a84ff', e:'🎛️' },
  { n:'R&B',          c:'#bf5af2', e:'🎶' },
  { n:'K-Pop',        c:'#ff6b9d', e:'🌸' },
  { n:'Bollywood',    c:'#ff9500', e:'🎬' },
  { n:'Sad Songs',    c:'#636366', e:'🌧️' },
];

// ── INIT ──
window.addEventListener('load', async () => {
  setGreeting();
  applyRegion();
  buildCatGrid();
  buildSettings();
  renderLibrary();
  await loadHome();
  setTimeout(() => document.getElementById('loading').classList.add('gone'), 1000);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  // Search input
  const inp = document.getElementById('s-inp');
  inp.addEventListener('input', onSearchInput);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') { inp.blur(); doSearch(inp.value.trim()); } });
});

// ── GREETING ──
function setGreeting() {
  const h = new Date().getHours();
  document.getElementById('greet').textContent =
    h < 5 ? 'Good Night' : h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
}

// ── REGION ──
function applyRegion() {
  const r = REGIONS.find(x => x.code === S.region) || REGIONS[0];
  document.getElementById('region-flag').textContent  = r.flag;
  document.getElementById('region-label').textContent = r.code;
}

function openRegion() {
  const list = document.getElementById('region-list');
  list.innerHTML = REGIONS.map(r => `
    <div class="sheet-item ${r.code===S.region?'sel':''}" onclick="selectRegion('${r.code}')">
      <div class="sheet-dot ${r.code===S.region?'on':''}">
        ${r.code===S.region?'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6 9 17l-5-5"/></svg>':''}
      </div>
      <span style="font-size:22px">${r.flag}</span>
      <div>
        <div style="font-size:15px;font-weight:500">${r.name}</div>
        <div style="font-size:12px;color:var(--txt2)">${r.code}</div>
      </div>
    </div>`).join('');
  openSheet('region-sheet');
}

function selectRegion(code) {
  S.region = code;
  localStorage.setItem('ap_region', code);
  applyRegion();
  closeSheet('region-sheet');
  toast(`🌍 Region: ${REGIONS.find(r=>r.code===code)?.name}`);
  loadHome();
}

// ── TABS ──
function goTab(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById('v-' + name).classList.add('active');
  btn.classList.add('on');
  if (name === 'search') setTimeout(() => document.getElementById('s-inp').focus(), 200);
}

// ── HOME ──
async function loadHome() {
  const el = document.getElementById('home-body');
  el.innerHTML = skelHome();
  try {
    const r = await fetch(`/api/home?region=${S.region}`);
    const d = await r.json();
    if (d.sections?.length) {
      queue = d.sections.flatMap(s => s.items || []).filter(t => t.id);
      el.innerHTML = renderSections(d.sections);
    } else throw new Error('empty');
  } catch {
    queue = [...DEMOS];
    el.innerHTML = renderFallback();
  }
}

function skelHome() {
  return `<div style="padding:4px 16px 0">
    <div class="sk" style="height:220px;border-radius:22px;margin-bottom:26px"></div>
    <div style="display:flex;gap:13px;overflow:hidden;padding:0 4px">
      ${[1,2,3,4].map(()=>`<div class="sk" style="width:150px;height:150px;border-radius:14px;flex-shrink:0"></div>`).join('')}
    </div>
  </div>`;
}

function renderFallback() {
  const r = REGIONS.find(x=>x.code===S.region);
  return `
    <div class="hero" onclick='play(${enc(DEMOS[0])})'>
      <img src="${DEMOS[0].thumb}" alt="">
      <div class="hero-body">
        <div class="hero-lbl">${r?.flag||'🌏'} ${r?.name||'Global'} Charts</div>
        <div class="hero-ttl">${esc(DEMOS[0].title)}</div>
        <div class="hero-sub">${esc(DEMOS[0].artist)}</div>
      </div>
      <div class="hero-play">▶</div>
    </div>
    <div class="sec">
      <div class="sec-hdr"><div class="sec-ttl">Quick Picks</div></div>
      <div class="qp-grid">${DEMOS.slice(0,8).map(t=>qpCard(t)).join('')}</div>
    </div>
    <div class="sec">
      <div class="sec-hdr"><div class="sec-ttl">Top Songs</div></div>
      <div class="hs">${DEMOS.map(t=>sCard(t)).join('')}</div>
    </div>
    <div class="sec">
      <div class="sec-hdr"><div class="sec-ttl">Recently Added</div></div>
      ${DEMOS.slice(0,5).map((t,i)=>liItem(t,i+1)).join('')}
    </div>`;
}

function renderSections(secs) {
  let html = '';
  let heroSet = false;
  secs.forEach((s, i) => {
    if (!s.items?.length) return;
    if (!heroSet && s.items[0]) {
      const f = s.items[0];
      html += `
        <div class="hero" onclick='play(${enc(f)})'>
          <img src="${esc(f.thumb)}" alt="" loading="lazy">
          <div class="hero-body">
            <div class="hero-lbl">${esc(s.title)}</div>
            <div class="hero-ttl">${esc(f.title)}</div>
            <div class="hero-sub">${esc(f.artist)}</div>
          </div>
          <div class="hero-play">▶</div>
        </div>`;
      heroSet = true;
    }
    if (i === 0 && s.items.length >= 6) {
      html += `<div class="sec"><div class="sec-hdr"><div class="sec-ttl">Quick Picks</div></div>
        <div class="qp-grid">${s.items.slice(0,8).map(t=>qpCard(t)).join('')}</div></div>`;
    }
    if (i === 1) {
      html += `<div class="sec"><div class="sec-hdr"><div class="sec-ttl">${esc(s.title)}</div><div class="sec-all">See All</div></div>
        <div class="hs">${s.items.map(t=>sCard(t)).join('')}</div></div>`;
    }
    if (i >= 2) {
      const useList = s.items.length <= 5;
      html += `<div class="sec"><div class="sec-hdr"><div class="sec-ttl">${esc(s.title)}</div><div class="sec-all">See All</div></div>
        ${useList
          ? s.items.map((t,j)=>liItem(t,j+1)).join('')
          : `<div class="hs">${s.items.map(t=>sCard(t)).join('')}</div>`
        }</div>`;
    }
  });
  return html;
}

function sCard(t) {
  return `<div class="scard" onclick='play(${enc(t)})'>
    <div class="scard-art">
      <img src="${esc(t.thumb)}" alt="" loading="lazy" onerror="this.style.opacity='.3'">
      <div class="scard-ov"><svg width="44" height="44" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
    </div>
    <div class="scard-ttl">${esc(t.title)}</div>
    <div class="scard-sub">${esc(t.artist)}</div>
  </div>`;
}

function qpCard(t) {
  return `<div class="qp" onclick='play(${enc(t)})'>
    <div class="qp-img"><img src="${esc(t.thumb)}" alt="" loading="lazy" onerror="this.style.opacity='.3'"></div>
    <div class="qp-name">${esc(t.title)}</div>
  </div>`;
}

function liItem(t, n) {
  return `<div class="li" onclick='play(${enc(t)})'>

let sTimer;
function onSearchInput() {
  const q = document.getElementById('s-inp').value.trim();
  document.getElementById('s-clr').style.display = q ? 'block' : 'none';
  clearTimeout(sTimer);
  if (!q) { showCats(); return; }
  sTimer = setTimeout(() => doSearch(q), 500);
}

function clearSearch() {
  document.getElementById('s-inp').value = '';
  document.getElementById('s-clr').style.display = 'none';
  showCats();
}

function showCats() {
  document.getElementById('cat-grid').style.display = 'grid';
  document.getElementById('s-results').style.display = 'none';
  document.getElementById('s-results').innerHTML = '';
}

function buildCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATS.map(c =>
    `<div class="cat" style="background:linear-gradient(135deg,${c.c},${c.c}99)" onclick="doSearch('${c.n}')">
      <span class="cat-em">${c.e}</span>${c.n}
    </div>`).join('');

async function doSearch(q) {
  if (!q) return;
  const inp = document.getElementById('s-inp');
  if (inp.value !== q) { inp.value = q; document.getElementById('s-clr').style.display='block'; }
  document.getElementById('cat-grid').style.display = 'none';
  const res = document.getElementById('s-results');
  res.style.display = 'block';
  res.innerHTML = `<div style="padding:40px;text-align:center;color:var(--txt2)">
    <div style="font-size:28px;margin-bottom:12px">🔍</div>Searching for "<b>${esc(q)}</b>"…
  </div>`;
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&region=${S.region}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.results?.length) {
      queue = d.results; qIdx = -1;
      res.innerHTML = `<div class="sec-hdr" style="padding-top:8px"><div class="sec-ttl">Results for "${esc(q)}"</div></div>`
        + d.results.map((t,i) => liItem(t, i+1)).join('');
    } else {
      res.innerHTML = `<div style="padding:60px;text-align:center;color:var(--txt2)">
        <div style="font-size:44px;margin-bottom:14px">😔</div>
        <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">No results</div>
        Try a different search term
      </div>`;
    }
  } catch(err) {
    res.innerHTML = `<div style="padding:60px;text-align:center;color:var(--txt2)">
      <div style="font-size:44px;margin-bottom:14px">⚠️</div>
      <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">Search failed</div>
      ${err.message} — check your connection
    </div>`;
  }
}

// ── PLAYER ──
async function play(t) {
  if (typeof t === 'string') t = JSON.parse(t);
  curTrack = t;
  const foundIdx = queue.findIndex(x => x.id === t.id);
  if (foundIdx >= 0) qIdx = foundIdx;
  else { queue.unshift(t); qIdx = 0; }

  updateUI(t);
  showMini();
  setPlayState(false);
  addRecent(t);
  cancelCrossfade();

  document.getElementById('np-ctx-nm').textContent = t.artist || 'Applify';

  try {
    const r = await fetch(`/api/stream?videoId=${t.id}&quality=${S.quality}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.url) throw new Error('No stream URL');
    audio.src = d.url;
    audio.load();
    await audio.play();
    setPlayState(true);
    if (S.crossfade) scheduleCrossfade();
    fetchLyrics(t);
  } catch(err) {
    console.error('Play error:', err);
    toast('⚠️ Cannot load track — trying next');
    setTimeout(() => next(), 1500);
  }
}

function updateUI(t) {
  const th = t.thumb || '';
  ['mini-img','np-img'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.src = th;
  });
  document.getElementById('mini-ttl').textContent  = t.title  || 'Unknown';
  document.getElementById('mini-art2').textContent = t.artist || '—';
  document.getElementById('np-song').textContent   = t.title  || 'Unknown';
  document.getElementById('np-artist').textContent = t.artist || '—';
  document.getElementById('np-blur').style.backgroundImage = `url(${th})`;
  updateHeart();
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title||'', artist: t.artist||'',
      artwork: [{ src: th, sizes:'512x512', type:'image/jpeg' }]
    });
  }
}

const PLAY_I  = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_I = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

function setPlayState(state) {
  isPlaying = state;
  document.getElementById('mini-play').innerHTML = state ? PAUSE_I(28) : PLAY_I(28);
  document.getElementById('np-play').innerHTML   = state ? PAUSE_I(38) : PLAY_I(38);
  document.getElementById('np-art').classList.toggle('big', state);
  if ('mediaSession' in navigator)
    navigator.mediaSession.playbackState = state ? 'playing' : 'paused';
}

function togglePlay() {
  if (!curTrack) return;
  if (isPlaying) audio.pause();
  else audio.play().catch(e => toast('⚠️ ' + e.message));
}

function prev() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (!queue.length) return;
  qIdx = (qIdx - 1 + queue.length) % queue.length;
  play(queue[qIdx]);
}

function next() {
  if (!queue.length) return;
  cancelCrossfade();
  if (isShuffle) qIdx = Math.floor(Math.random() * queue.length);
  else qIdx = (qIdx + 1) % queue.length;
  play(queue[qIdx]);
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuf-btn').classList.toggle('on', isShuffle);
  toast(isShuffle ? '🔀 Shuffle on' : 'Shuffle off');
}
function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('rep-btn').classList.toggle('on', isRepeat);
  toast(isRepeat ? '🔁 Repeat on' : 'Repeat off');
}

function shareTrack() {
  if (!curTrack) return;
  const url = `https://music.youtube.com/watch?v=${curTrack.id}`;
  if (navigator.share) navigator.share({ title: curTrack.title, url }).catch(()=>{});
  else navigator.clipboard?.writeText(url).then(() => toast('🔗 Link copied!'));
}

function seek(e) {
  const rect = document.getElementById('np-prog').getBoundingClientRect();
  const r = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = r * audio.duration;
}

// ── CROSSFADE ──
function scheduleCrossfade() {
  cancelCrossfade();
  const dur = S.xfadeDur * 1000;
  const check = () => {
    if (!audio.duration || !isPlaying) return;
    const rem = (audio.duration - audio.currentTime) * 1000;
    if (rem <= dur) {
      startCrossfade();
    } else {
      xfadeTimer = setTimeout(check, Math.max(500, rem - dur - 500));
    }
  };
  xfadeTimer = setTimeout(check, 3000);
}

function cancelCrossfade() {
  clearTimeout(xfadeTimer);
  xfadeTimer = null;
}

function startCrossfade() {
  if (!S.crossfade || !queue.length) return;
  const label = document.getElementById('xfade-bar');
  label.textContent = S.djStyle ? '🎛️ DJ Crossfade' : '🎵 Crossfading…';
  label.classList.add('in');
  setTimeout(() => label.classList.remove('in'), 3000);

  const dur = S.xfadeDur * 1000;
  const steps = 20;
  const interval = dur / steps;
  let step = 0;
  const startVol = audio.volume;
  const fade = setInterval(() => {
    step++;
    const ratio = step / steps;
    if (S.djStyle) {
      // DJ style: exaggerated fade curve
      audio.volume = startVol * Math.pow(1 - ratio, 1.5);
    } else {
      audio.volume = startVol * (1 - ratio);
    }
    if (step >= steps) {
      clearInterval(fade);
      audio.volume = startVol;
      next();
    }
  }, interval);
}

// ── AUDIO EVENTS ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('mini-pb-fill').style.width = pct + '%';
  document.getElementById('np-fill').style.width      = pct + '%';
  const knob = document.getElementById('np-knob');
  const prog = document.getElementById('np-prog');
  knob.style.right = (100 - pct) + '%';
  knob.style.right = 'auto';
  knob.style.left  = pct + '%';
  document.getElementById('np-cur').textContent = fmt(audio.currentTime);
  document.getElementById('np-dur').textContent = fmt(audio.duration);
  highlightLyric(audio.currentTime);
});

audio.addEventListener('play',  () => setPlayState(true));
audio.addEventListener('pause', () => setPlayState(false));
audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime=0; audio.play(); }
  else next();
});
audio.addEventListener('error', e => {
  console.error('Audio error', e);
  toast('⚠️ Playback error — skipping');
  setTimeout(next, 2000);
});

if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play',          () => audio.play());
  navigator.mediaSession.setActionHandler('pause',         () => audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack',     next);
  navigator.mediaSession.setActionHandler('previoustrack', prev);
  navigator.mediaSession.setActionHandler('seekto',        d => { audio.currentTime = d.seekTime; });
}

function toggleLyrics() {
  showLyrics = !showLyrics;
  const panel = document.getElementById('np-lyrics-panel');
  const btn   = document.getElementById('lrc-btn');
  panel.style.display = showLyrics ? 'block' : 'none';
  btn.textContent = showLyrics ? 'Hide Lyrics' : 'Show Lyrics';
}

async function fetchLyrics(t) {
  lrcLines = [];
  document.getElementById('lrc-content').className = 'lrc-empty';
  document.getElementById('lrc-content').textContent = 'Loading lyrics…';
  try {
    const q = encodeURIComponent(`${t.title} ${t.artist}`);
    const r = await fetch(`https://lrclib.net/api/search?q=${q}`);
    const list = await r.json();
    if (!list?.length) throw new Error('Not found');
    const best = list.find(x => x.syncedLyrics) || list[0];
    if (best.syncedLyrics) {
      lrcLines = parseLRC(best.syncedLyrics);
      renderLRC();
    } else if (best.plainLyrics) {
      document.getElementById('lrc-content').className = '';
      document.getElementById('lrc-content').innerHTML =
        best.plainLyrics.split('\n').map(l => `<div class="lrc-line">${esc(l) || '&nbsp;'}</div>`).join('');
    } else throw new Error('No lyrics');
  } catch {
    document.getElementById('lrc-content').textContent = 'No lyrics found';
  }
}

function parseLRC(lrc) {
  return lrc.split('\n').map(line => {
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!m) return null;
    return { t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() };
  }).filter(Boolean);
}

function renderLRC() {
  document.getElementById('lrc-content').className = '';
  document.getElementById('lrc-content').innerHTML =
    lrcLines.map((l,i) => `<div class="lrc-line" id="lrc-${i}">${esc(l.text)||'♪'}</div>`).join('');
}

let lastLrcIdx = -1;
function highlightLyric(t) {
  if (!lrcLines.length) return;
  let idx = lrcLines.findLastIndex(l => l.t <= t);
  if (idx < 0) idx = 0;
  if (idx === lastLrcIdx) return;
  lastLrcIdx = idx;
  document.querySelectorAll('.lrc-line').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const el = document.getElementById(`lrc-${idx}`);
  el?.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── UTILS ──
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function enc(o) { return JSON.stringify(JSON.stringify(o)); }
