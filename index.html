<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Applify</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Applify">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root {
      --accent: #fc3c44;
      --accent2: #ff6b6b;
      --bg: #000;
      --bg2: #0a0a0a;
      --bg3: #141414;
      --glass: rgba(255,255,255,.06);
      --glass-b: rgba(255,255,255,.10);
      --glass-strong: rgba(255,255,255,.13);
      --text: #fff;
      --text2: rgba(255,255,255,.60);
      --text3: rgba(255,255,255,.30);
      --r: 14px;
      --r-lg: 24px;
      --mini-h: 74px;
      --tab-h: 70px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:100%;background:#000}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
      background:var(--bg);color:var(--text);height:100%;overflow:hidden;
      -webkit-font-smoothing:antialiased;user-select:none;
    }
    #app{width:100%;height:100dvh;position:relative;overflow:hidden}

    /* ── LOADING ── */
    #loading{
      position:absolute;inset:0;background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:999;gap:16px;transition:opacity .7s ease;
    }
    #loading.out{opacity:0;pointer-events:none}
    .ld-icon{
      width:96px;height:96px;border-radius:24px;
      background:linear-gradient(145deg,#fc3c44,#ff6b6b,#ff8f8f);
      display:flex;align-items:center;justify-content:center;font-size:44px;
      box-shadow:0 0 0 0 rgba(252,60,68,.5);
      animation:ldpulse 2s ease-in-out infinite;
    }
    @keyframes ldpulse{0%,100%{box-shadow:0 0 30px rgba(252,60,68,.4),0 0 60px rgba(252,60,68,.2)}50%{box-shadow:0 0 50px rgba(252,60,68,.7),0 0 100px rgba(252,60,68,.35)}}
    .ld-name{font-size:32px;font-weight:800;letter-spacing:-.8px}
    .ld-sub{font-size:13px;color:var(--text2)}
    .ld-bar{width:140px;height:3px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden;margin-top:4px}
    .ld-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;width:0;animation:ldfill 2.5s ease-in-out forwards}
    @keyframes ldfill{0%{width:0}60%{width:75%}100%{width:100%}}

    /* ── VIEWS ── */
    .view{
      position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      padding-bottom:calc(var(--mini-h) + var(--tab-h) + var(--safe-b) + 16px);
      padding-top:var(--safe-t);
      display:none;scrollbar-width:none;
    }
    .view::-webkit-scrollbar{display:none}
    .view.active{display:block}

    /* ── PAGE HEADER ── */
    .page-hdr{
      padding:18px 20px 12px;position:sticky;top:0;z-index:10;
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      display:flex;align-items:center;justify-content:space-between;
    }
    .page-title{
      font-size:34px;font-weight:800;letter-spacing:-.8px;
      background:linear-gradient(135deg,#fff 50%,rgba(255,255,255,.5));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .hdr-actions{display:flex;gap:10px;align-items:center}
    .hdr-btn{
      width:36px;height:36px;border-radius:50%;border:none;
      background:var(--glass-strong);backdrop-filter:blur(20px);
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s;-webkit-appearance:none;
    }
    .hdr-btn:active{background:var(--glass-b)}

    /* ── REGION PILL ── */
    #region-pill{
      display:flex;align-items:center;gap:6px;padding:6px 12px;
      background:var(--glass-strong);border:1px solid var(--glass-b);
      border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
      transition:background .15s;
    }
    #region-pill:active{background:rgba(255,255,255,.2)}

    /* ── REGION MODAL ── */
    #region-modal{
      position:fixed;inset:0;z-index:200;
      display:flex;align-items:flex-end;justify-content:center;
      padding:0 12px calc(var(--safe-b) + 12px);
      pointer-events:none;opacity:0;transition:opacity .3s;
    }
    #region-modal.open{pointer-events:all;opacity:1}
    .rm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
    .rm-sheet{
      position:relative;z-index:1;width:100%;max-width:500px;
      background:rgba(28,28,30,.97);border-radius:24px 24px 20px 20px;
      border:1px solid var(--glass-b);overflow:hidden;
      transform:translateY(30px);transition:transform .35s cubic-bezier(.32,.72,0,1);
    }
    #region-modal.open .rm-sheet{transform:translateY(0)}
    .rm-hdr{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between}
    .rm-title{font-size:18px;font-weight:700}
    .rm-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;-webkit-appearance:none;padding:4px}
    .rm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:14px}
    .rm-item{
      display:flex;align-items:center;gap:10px;padding:12px 14px;
      border-radius:14px;cursor:pointer;transition:background .15s;
      border:1.5px solid transparent;
    }
    .rm-item:active{background:var(--glass)}
    .rm-item.sel{background:rgba(252,60,68,.12);border-color:rgba(252,60,68,.4)}
    .rm-flag{font-size:24px;line-height:1}
    .rm-label{font-size:14px;font-weight:600}

    /* ── SECTIONS ── */
    .section{margin-top:28px}
    .sec-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px 14px}
    .sec-title{font-size:21px;font-weight:700;letter-spacing:-.3px}
    .sec-all{font-size:14px;color:var(--accent);font-weight:500;cursor:pointer}

    /* ── HERO BANNER ── */
    .hero-banner{
      margin:10px 16px;border-radius:22px;overflow:hidden;
      position:relative;height:220px;cursor:pointer;
      background:linear-gradient(135deg,#1a1a2e,#16213e);
    }
    .hero-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s,opacity .3s}
    .hero-banner:active .hero-img{transform:scale(1.03);opacity:.8}
    .hero-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.3) 50%,transparent 100%);
    }
    .hero-body{position:absolute;bottom:0;left:0;right:0;padding:20px}
    .hero-tag{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    .hero-title{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
    .hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
    .hero-play{
      position:absolute;bottom:20px;right:20px;
      width:44px;height:44px;border-radius:50%;border:none;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .2s,transform .2s;-webkit-appearance:none;
    }
    .hero-play:active{background:rgba(255,255,255,.3);transform:scale(.9)}

    /* ── NEW RELEASES ROW (large cards) ── */
    .h-scroll{
      display:flex;gap:12px;padding:0 20px;
      overflow-x:auto;-webkit-overflow-scrolling:touch;
      scroll-snap-type:x mandatory;scrollbar-width:none;
    }
    .h-scroll::-webkit-scrollbar{display:none}

    .song-card{flex-shrink:0;width:150px;cursor:pointer;scroll-snap-align:start;transition:transform .15s,opacity .15s}
    .song-card:active{transform:scale(.92);opacity:.75}
    .card-art{
      width:150px;height:150px;border-radius:16px;overflow:hidden;
      background:var(--bg3);margin-bottom:9px;position:relative;
    }
    .card-art img{width:100%;height:100%;object-fit:cover;display:block}
    .card-play-btn{
      position:absolute;bottom:8px;right:8px;
      width:38px;height:38px;border-radius:50%;
      background:rgba(252,60,68,.9);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s;
    }
    .song-card:hover .card-play-btn,.song-card:active .card-play-btn{opacity:1;transform:translateY(0)}
    .card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .card-new-badge{
      position:absolute;top:8px;left:8px;
      background:var(--accent);color:#fff;
      font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
      padding:2px 7px;border-radius:8px;
    }

    /* ── WIDE CARD (album style) ── */
    .wide-scroll{display:flex;gap:14px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .wide-scroll::-webkit-scrollbar{display:none}
    .wide-card{
      flex-shrink:0;width:240px;border-radius:18px;overflow:hidden;
      background:var(--bg3);cursor:pointer;transition:transform .15s,opacity .15s;
      position:relative;border:1px solid rgba(255,255,255,.06);
    }
    .wide-card:active{transform:scale(.94);opacity:.8}
    .wide-art{width:100%;height:140px;object-fit:cover;display:block}
    .wide-body{padding:12px}
    .wide-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wide-sub{font-size:12px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── LIST ITEM ── */
    .list-item{
      display:flex;align-items:center;gap:13px;
      padding:9px 20px;cursor:pointer;
      border-radius:14px;margin:0 6px;
      transition:background .15s;
    }
    .list-item:active{background:var(--glass)}
    .list-thumb{
      width:52px;height:52px;border-radius:11px;overflow:hidden;
      background:var(--bg3);flex-shrink:0;position:relative;
    }
    .list-thumb img{width:100%;height:100%;object-fit:cover}
    .list-num{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.5);font-size:15px;font-weight:700;
      opacity:0;transition:opacity .2s;
    }
    .list-item:hover .list-num{opacity:1}
    .list-info{flex:1;min-width:0}
    .list-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .list-more{color:var(--text3);font-size:20px;padding:4px}

    /* ── CHART ITEM ── */
    .chart-item{
      display:flex;align-items:center;gap:13px;
      padding:9px 20px;cursor:pointer;transition:background .15s;
    }
    .chart-item:active{background:var(--glass)}
    .chart-num{font-size:17px;font-weight:800;color:var(--text3);width:28px;flex-shrink:0;text-align:center}
    .chart-thumb{width:50px;height:50px;border-radius:10px;overflow:hidden;background:var(--bg3);flex-shrink:0}
    .chart-thumb img{width:100%;height:100%;object-fit:cover}
    .chart-info{flex:1;min-width:0}
    .chart-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chart-sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .chart-up{font-size:11px;color:#30d158;font-weight:700}
    .chart-same{font-size:11px;color:var(--text3);font-weight:700}

    /* ── SEARCH ── */
    .search-bar-wrap{
      padding:4px 20px 14px;
      position:sticky;top:calc(62px + var(--safe-t));z-index:10;
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    }
    .search-bar{
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.11);border:1px solid var(--glass-b);
      border-radius:14px;padding:11px 14px;
    }
    .search-bar input{
      flex:1;background:none;border:none;outline:none;
      color:#fff;font-size:16px;font-family:inherit;
    }
    .search-bar input::placeholder{color:var(--text2)}
    #s-clear{color:var(--text2);cursor:pointer;display:none;flex-shrink:0}

    .search-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 20px}
    .search-cat{
      height:94px;border-radius:16px;padding:12px;
      font-size:16px;font-weight:700;cursor:pointer;
      position:relative;overflow:hidden;display:flex;align-items:flex-end;
      transition:transform .15s,opacity .15s;
    }
    .search-cat:active{transform:scale(.93);opacity:.8}
    .cat-emoji{position:absolute;top:10px;right:12px;font-size:30px}

    /* ── MINI PLAYER ── */
    #mini-player{
      position:fixed;
      bottom:calc(var(--tab-h) + var(--safe-b) + 8px);
      left:12px;right:12px;height:var(--mini-h);
      background:rgba(24,24,26,.92);
      backdrop-filter:blur(60px) saturate(200%);
      -webkit-backdrop-filter:blur(60px) saturate(200%);
      border-radius:22px;border:1px solid rgba(255,255,255,.11);
      display:flex;align-items:center;padding:10px 12px;gap:11px;
      z-index:60;cursor:pointer;
      transform:translateY(200%);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 8px 40px rgba(0,0,0,.6);
    }
    #mini-player.show{transform:translateY(0)}
    .mini-art{width:52px;height:52px;border-radius:12px;overflow:hidden;background:var(--bg3);flex-shrink:0}
    .mini-art img{width:100%;height:100%;object-fit:cover}
    .mini-info{flex:1;min-width:0}
    .mini-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mini-artist{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .mini-btns{display:flex;align-items:center;gap:2px}
    .cb{
      width:40px;height:40px;border:none;background:none;color:#fff;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;border-radius:50%;transition:background .15s;-webkit-appearance:none;
    }
    .cb:active{background:rgba(255,255,255,.12)}
    .mini-prog{position:absolute;bottom:0;left:0;right:0;height:2.5px;background:rgba(255,255,255,.1);border-radius:0 0 22px 22px;overflow:hidden}
    .mini-prog-fill{height:100%;background:var(--accent);width:0;border-radius:0 0 22px 22px;transition:width .8s linear}

    /* ── NOW PLAYING ── */
    #now-playing{
      position:fixed;inset:0;z-index:90;
      transform:translateY(100%);
      transition:transform .5s cubic-bezier(.32,.72,0,1);
      overflow:hidden;
    }
    #now-playing.open{transform:translateY(0)}
    .np-bg{position:absolute;inset:0;background:#111}
    .np-blur{
      position:absolute;inset:-80px;
      background-size:cover;background-position:center;
      filter:blur(90px) brightness(.3) saturate(2.5);
      transform:scale(1.4);transition:background-image .7s ease;
    }
    .np-ov{position:absolute;inset:0;background:rgba(0,0,0,.3)}
    .np-inner{
      position:relative;z-index:2;height:100%;
      display:flex;flex-direction:column;
      padding-top:var(--safe-t);padding-bottom:var(--safe-b);
    }
    .np-drag{display:flex;justify-content:center;padding:14px;cursor:pointer;flex-shrink:0}
    .np-drag-bar{width:36px;height:4px;background:rgba(255,255,255,.28);border-radius:2px}
    .np-topbar{display:flex;align-items:center;padding:0 20px 14px;flex-shrink:0}
    .np-tab-label{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.2px}
    .np-btn{width:36px;height:36px;background:none;border:none;color:rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;-webkit-appearance:none;transition:background .15s}
    .np-btn:active{background:rgba(255,255,255,.12)}

    .np-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:0 28px;min-height:0}
    .np-art{
      width:100%;max-width:320px;aspect-ratio:1;
      border-radius:22px;overflow:hidden;background:var(--bg3);
      box-shadow:0 28px 90px rgba(0,0,0,.65);
      transform:scale(.92);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .np-art.playing{transform:scale(1)}
    .np-art img{width:100%;height:100%;object-fit:cover;display:block}

    .np-meta{padding:20px 26px 8px;display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
    .np-meta-text{flex:1;min-width:0}
    .np-song{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-artist{font-size:15px;color:rgba(255,255,255,.6);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-heart{width:38px;height:38px;background:none;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:transform .2s,color .2s;-webkit-appearance:none}
    .np-heart.liked{color:var(--accent);transform:scale(1.2)}

    .np-prog-wrap{padding:4px 26px 0;flex-shrink:0}
    .np-prog{height:4px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;position:relative;touch-action:none}
    .np-prog-fill{height:100%;background:#fff;width:0;border-radius:3px;pointer-events:none;transition:width .8s linear}
    .np-times{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text2);letter-spacing:.2px}

    .np-controls{display:flex;align-items:center;justify-content:space-evenly;padding:14px 16px;flex-shrink:0}
    .npc{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:opacity .15s,background .15s;-webkit-appearance:none}
    .npc:active{opacity:.5}
    .npc.sm{width:44px;height:44px;color:var(--text2)}
    .npc.md{width:56px;height:56px}
    .npc.lg{width:76px;height:76px;background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18)}
    .npc.on{color:var(--accent)!important}

    .np-vol{display:flex;align-items:center;gap:11px;padding:0 26px 16px;flex-shrink:0}
    .np-vol svg{color:var(--text2);flex-shrink:0}
    .np-vol input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,.18);border-radius:3px;cursor:pointer}
    .np-vol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}

    .np-extras{display:flex;justify-content:center;gap:28px;padding:0 20px 12px;flex-shrink:0}
    .np-extra-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:var(--text2);font-size:10px;font-weight:600;letter-spacing:.3px;background:none;border:none;-webkit-appearance:none;transition:color .2s}
    .np-extra-btn:active{color:#fff}
    .np-extra-btn svg{width:22px;height:22px}

    /* ── LYRICS PANEL ── */
    #lyrics-panel{
      position:fixed;inset:0;z-index:95;
      transform:translateY(100%);transition:transform .45s cubic-bezier(.32,.72,0,1);
      background:rgba(0,0,0,.96);backdrop-filter:blur(30px);
      overflow-y:auto;padding:60px 24px 120px;
      scrollbar-width:none;
    }
    #lyrics-panel::-webkit-scrollbar{display:none}
    #lyrics-panel.open{transform:translateY(0)}
    .lyr-close{
      position:fixed;top:calc(var(--safe-t) + 16px);right:20px;
      width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);
      border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      z-index:96;-webkit-appearance:none;
    }
    #lyrics-text{font-size:18px;line-height:2;color:var(--text2);transition:color .3s}
    #lyrics-text.loaded{color:#fff}
    #lyrics-text p{margin-bottom:4px;transition:color .3s,font-size .3s}
    #lyrics-text p.active{color:#fff;font-size:20px;font-weight:700}

    /* ── TAB BAR ── */
    #tab-bar{
      position:fixed;bottom:var(--safe-b);left:12px;right:12px;height:var(--tab-h);
      background:rgba(16,16,18,.86);
      backdrop-filter:blur(60px) saturate(200%);
      -webkit-backdrop-filter:blur(60px) saturate(200%);
      border-radius:28px;border:1px solid rgba(255,255,255,.09);
      display:flex;align-items:center;justify-content:space-around;
      z-index:65;box-shadow:0 4px 30px rgba(0,0,0,.55);
    }
    .tab{
      flex:1;height:100%;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:5px;
      border:none;background:none;color:var(--text2);
      font-size:10px;font-weight:600;font-family:inherit;
      cursor:pointer;border-radius:28px;letter-spacing:.2px;
      transition:color .2s;-webkit-appearance:none;
    }
    .tab.on{color:var(--accent)}
    .tab svg{width:26px;height:26px}

    /* ── SKELETON ── */
    .skel{background:linear-gradient(90deg,var(--bg3) 25%,#222 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:10px}
    @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── TOAST ── */
    #toast{
      position:fixed;top:calc(18px + var(--safe-t));
      left:50%;transform:translateX(-50%) translateY(-80px);
      background:rgba(28,28,30,.97);border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(20px);color:#fff;
      padding:10px 22px;border-radius:30px;
      font-size:14px;font-weight:500;z-index:300;
      transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
      max-width:calc(100vw - 40px);text-align:center;
    }
    #toast.in{transform:translateX(-50%) translateY(0)}

    /* ── LIBRARY ── */
    .lib-empty{padding:60px 28px;text-align:center;color:var(--text2)}
    .lib-empty .lib-icon{font-size:60px;margin-bottom:18px}
    .lib-empty h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:10px}
    .lib-empty p{font-size:14px;line-height:1.7}

    /* ── SETTINGS VIEW ── */
    #settings-view .setting-group{padding:0 20px;margin-bottom:28px}
    .sg-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;padding:0 4px 10px}
    .setting-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
    }
    .setting-row:last-child{border-bottom:none}
    .setting-label{font-size:15px;font-weight:500}
    .setting-sub{font-size:12px;color:var(--text2);margin-top:3px}
    .sw{
      width:51px;height:31px;border-radius:16px;
      background:rgba(255,255,255,.18);position:relative;
      cursor:pointer;transition:background .3s;flex-shrink:0;border:none;-webkit-appearance:none;
    }
    .sw.on{background:#34c759}
    .sw::after{
      content:'';position:absolute;top:2px;left:2px;
      width:27px;height:27px;border-radius:50%;background:#fff;
      box-shadow:0 2px 6px rgba(0,0,0,.3);
      transition:transform .3s;
    }
    .sw.on::after{transform:translateX(20px)}

    /* ── RESPONSIVE ── */
    @media(min-width:520px){
      #mini-player,#tab-bar{max-width:500px;left:50%;right:auto;transform:translate(-50%,200%)}
      #mini-player.show{transform:translate(-50%,0)}
      #tab-bar{transform:translateX(-50%)}
    }
    *{scrollbar-width:none}*::-webkit-scrollbar{display:none}
  </style>

<script>
/* ════════════════════════════════════════
   APPLIFY — Full App Logic v2
════════════════════════════════════════ */

// ── AUDIO (crossfade support) ──
let audioA = new Audio(), audioB = new Audio();
let activeAudio = audioA;
audioA.crossOrigin = 'anonymous';
audioB.crossOrigin = 'anonymous';
audioA.preload = 'auto';
audioB.preload = 'auto';

// ── STATE ──
let currentTrack = null;
let queue = [], qIdx = -1;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let isCrossfade = true;
let crossfadeDur = 5; // seconds
let vol = 1;
const liked = new Set(JSON.parse(localStorage.getItem('ap_liked') || '[]'));
let recent = JSON.parse(localStorage.getItem('ap_recent') || '[]');
let currentRegion = localStorage.getItem('ap_region') || 'US';
let settings = JSON.parse(localStorage.getItem('ap_settings') || '{}');

// ── REGIONS ──
const REGIONS = [
  { code:'BD', flag:'🇧🇩', name:'Bangladesh' },
  { code:'IN', flag:'🇮🇳', name:'India' },
  { code:'US', flag:'🇺🇸', name:'USA' },
  { code:'GB', flag:'🇬🇧', name:'UK' },
  { code:'PK', flag:'🇵🇰', name:'Pakistan' },
  { code:'JP', flag:'🇯🇵', name:'Japan' },
  { code:'KR', flag:'🇰🇷', name:'South Korea' },
  { code:'NG', flag:'🇳🇬', name:'Nigeria' },
  { code:'BR', flag:'🇧🇷', name:'Brazil' },
  { code:'MX', flag:'🇲🇽', name:'Mexico' },
  { code:'DE', flag:'🇩🇪', name:'Germany' },
  { code:'TR', flag:'🇹🇷', name:'Turkey' },
];

// ── DEMO TRACKS ──
const DEMOS = [
  {id:'dQw4w9WgXcQ', title:'Never Gonna Give You Up', artist:'Rick Astley',    thumb:'https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg'},
  {id:'JGwWNGJdvx8', title:'Shape of You',            artist:'Ed Sheeran',     thumb:'https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg'},
  {id:'kJQP7kiw5Fk', title:'Despacito',               artist:'Luis Fonsi',     thumb:'https://img.youtube.com/vi/kJQP7kiw5Fk/maxresdefault.jpg'},
  {id:'OPf0YbXqDm0', title:'Uptown Funk',             artist:'Bruno Mars',     thumb:'https://img.youtube.com/vi/OPf0YbXqDm0/maxresdefault.jpg'},
  {id:'hT_nvWreIhg', title:'Counting Stars',          artist:'OneRepublic',    thumb:'https://img.youtube.com/vi/hT_nvWreIhg/maxresdefault.jpg'},
  {id:'9bZkp7q19f0', title:'Gangnam Style',           artist:'PSY',            thumb:'https://img.youtube.com/vi/9bZkp7q19f0/maxresdefault.jpg'},
  {id:'bo_efYLyMcc', title:'Photograph',              artist:'Ed Sheeran',     thumb:'https://img.youtube.com/vi/bo_efYLyMcc/maxresdefault.jpg'},

];

/* ── INIT ── */
window.addEventListener('load', async () => {
  setGreeting();
  buildRegionGrid();
  buildSearchGrid();
  buildSettings();
  updateRegionDisplay();
  renderLibrary();
  await loadHome();
  setTimeout(() => document.getElementById('loading').classList.add('out'), 1000);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
});

function setGreeting() {
  const h = new Date().getHours();
  document.getElementById('greeting').textContent =
    h < 5 ? 'Good Night 🌙' : h < 12 ? 'Good Morning ☀️' : h < 17 ? 'Good Afternoon 🌤' : 'Good Evening 🌙';
}

/* ── TABS ── */
function goTab(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById(name + '-view').classList.add('active');
  if (btn) btn.classList.add('on');
  if (name === 'search') setTimeout(() => document.getElementById('s-input').focus(), 150);
  if (name === 'library') renderLibrary();
}

/* ── REGION ── */
function buildRegionGrid() {
  document.getElementById('region-grid').innerHTML = REGIONS.map(r => `
    <div class="rm-item ${r.code === currentRegion ? 'sel' : ''}" onclick="selectRegion('${r.code}','${r.flag}','${r.name}')">
      <span class="rm-flag">${r.flag}</span>
      <span class="rm-label">${r.name}</span>
    </div>
  `).join('');
}

function updateRegionDisplay() {
  const r = REGIONS.find(x => x.code === currentRegion) || REGIONS[2];
  document.getElementById('region-flag').textContent = r.flag;
  document.getElementById('region-label').textContent = r.name;
}

function selectRegion(code, flag, name) {
  currentRegion = code;
  localStorage.setItem('ap_region', code);
  updateRegionDisplay();

async function loadHome() {
  const el = document.getElementById('home-body');
  el.innerHTML = buildSkeleton();
  try {
    const r = await fetch(`/api/home?gl=${currentRegion}&hl=en`);
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    if (d.sections?.length) {
      queue = [];
      d.sections.forEach(s => s.items?.forEach(t => { if (!queue.find(x=>x.id===t.id)) queue.push(t); }));
      el.innerHTML = renderHome(d.sections);
    } else {
      el.innerHTML = fallbackHome();
    }
  } catch(e) {
    console.warn('Home API failed:', e.message);
    el.innerHTML = fallbackHome();
  }
}

/* ── PLAYER ── */
async function play(t) {
  if (typeof t === 'string') t = JSON.parse(t);
  currentTrack = t;
  qIdx = queue.findIndex(x => x.id === t.id);
  updateNowPlayingUI(t);
  showMiniPlayer();
  addRecent(t);
  setPlaying(false);
  try {
    const r = await fetch(`/api/stream?videoId=${t.id}`);
    if (!r.ok) throw new Error(`stream HTTP ${r.status}`);
    const d = await r.json();
    if (!d.url) throw new Error('no url returned');

    const prevAudio = activeAudio;
    const nextAudio = activeAudio === audioA ? audioB : audioA;
    nextAudio.volume = 0;
    nextAudio.src = d.url;

    await new Promise((res, rej) => {
      nextAudio.oncanplay = res;
      nextAudio.onerror = rej;
      nextAudio.load();
      setTimeout(res, 8000); // fallback
    });

    // Crossfade
    if (isCrossfade && prevAudio.src && !prevAudio.paused) {
      activeAudio = nextAudio;
      await nextAudio.play();
      crossfadeAudio(prevAudio, nextAudio, crossfadeDur);
    } else {
      prevAudio.pause();
      prevAudio.currentTime = 0;
      activeAudio = nextAudio;
      nextAudio.volume = vol;
      await nextAudio.play();
    }

    setPlaying(true);
    attachAudioEvents(activeAudio);
  } catch(e) {
    console.error('Play error:', e);
    toast('⚠️ Could not load track. Trying next...');
    setTimeout(next, 1500);
  }
}

function crossfadeAudio(from, to, dur) {
  const steps = 20;
  const interval = (dur * 1000) / steps;
  let step = 0;
  const fade = setInterval(() => {
    step++;
    const ratio = step / steps;
    from.volume = Math.max(0, vol * (1 - ratio));
    to.volume   = Math.min(vol, vol * ratio);
    if (step >= steps) {
      clearInterval(fade);
      from.pause();
      from.currentTime = 0;
    }
  }, interval);
}

function attachAudioEvents(a) {
  a.onplay    = () => setPlaying(true);
  a.onpause   = () => setPlaying(false);
  a.onended   = () => { if (isRepeat) { a.currentTime=0; a.play(); } else next(); };
  a.onerror   = () => { toast('Playback error'); setTimeout(next, 1200); };
  a.ontimeupdate = updateProgress;
}

function updateProgress() {
  const a = activeAudio;
  if (!a.duration) return;
  const pct = (a.currentTime / a.duration) * 100;
  document.getElementById('mini-pbar').style.width = pct + '%';
  document.getElementById('np-fill').style.width   = pct + '%';
  document.getElementById('np-cur').textContent    = fmtTime(a.currentTime);
  document.getElementById('np-dur').textContent    = fmtTime(a.duration);

  // Crossfade trigger
  if (isCrossfade && a.duration - a.currentTime < crossfadeDur && queue.length > 1) {
    if (a.dataset.xfTriggered !== '1') {
      a.dataset.xfTriggered = '1';
      preloadNext();
    }
  } else if (a.duration - a.currentTime > crossfadeDur + 1) {
    a.dataset.xfTriggered = '0';
  }
}

function preloadNext() {
  // Just fetch stream URL for next track to reduce latency
  const nextIdx = isShuffle
    ? Math.floor(Math.random() * queue.length)
    : (qIdx + 1) % queue.length;
  if (queue[nextIdx]) {
    fetch(`/api/stream?videoId=${queue[nextIdx].id}`).catch(() => {});
  }
}

function setPlaying(state) {
  isPlaying = state;
  const pSVG = `<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseSVG = `<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  const pSVGlg = `<svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseSVGlg = `<svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  document.getElementById('mini-play-btn').innerHTML = state ? pauseSVG : pSVG;
  document.getElementById('np-play-btn').innerHTML   = state ? pauseSVGlg : pSVGlg;
  document.getElementById('np-art-el').classList.toggle('playing', state);
  if ('mediaSession' in navigator) {
    navigator.mediaSession.playbackState = state ? 'playing' : 'paused';
  }
}

function togglePlay() {
  if (!currentTrack) return;
  if (isPlaying) activeAudio.pause(); else activeAudio.play().catch(() => {});
}

function prev() {
  if (activeAudio.currentTime > 3) { activeAudio.currentTime = 0; return; }
  if (qIdx > 0) play(queue[--qIdx]);
  else if (queue.length) play(queue[queue.length - 1]);
}

function next() {
  if (!queue.length) return;
  if (isShuffle) qIdx = Math.floor(Math.random() * queue.length);
  else qIdx = (qIdx + 1) % queue.length;
  play(queue[qIdx]);
}

function shuffleAll() {
  if (!queue.length) return;
  qIdx = Math.floor(Math.random() * queue.length);
  play(queue[qIdx]);
  toast('🔀 Shuffling all songs');
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuf-btn').classList.toggle('on', isShuffle);
  toast(isShuffle ? '🔀 Shuffle on' : 'Shuffle off');
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('rep-btn').classList.toggle('on', isRepeat);
  toast(isRepeat ? '🔁 Repeat on' : 'Repeat off');
}

function setVol(v) {
  vol = parseFloat(v);
  activeAudio.volume = vol;
}

function toggleLike() {
  if (!currentTrack) return;
  if (liked.has(currentTrack.id)) liked.delete(currentTrack.id);
  else liked.add(currentTrack.id);
  localStorage.setItem('ap_liked', JSON.stringify([...liked]));
  updateHeartUI();
  toast(liked.has(currentTrack.id) ? '❤️ Added to favorites' : 'Removed from favorites');
  renderLibrary();
}

function updateHeartUI() {
  if (!currentTrack) return;
  const isLiked = liked.has(currentTrack.id);
  const btn = document.getElementById('np-heart');
  btn.classList.toggle('liked', isLiked);
  btn.innerHTML = isLiked
    ? `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}

function seek(e) {
  const rect = document.getElementById('np-prog').getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  if (activeAudio.duration) activeAudio.currentTime = Math.max(0, Math.min(1, ratio)) * activeAudio.duration;
}

function shareTrack() {
  if (!currentTrack) return;
  const url = `https://music.youtube.com/watch?v=${currentTrack.id}`;
  if (navigator.share) navigator.share({ title: currentTrack.title, artist: currentTrack.artist, url }).catch(() => {});
  else navigator.clipboard?.writeText(url).then(() => toast('🔗 Link copied!'));
}

/* ── NOW PLAYING UI ── */
function updateNowPlayingUI(t) {
  const th = t.thumb || '';
  [document.getElementById('mini-img'), document.getElementById('np-img')]
    .forEach(el => { el.src = th; });
  document.getElementById('mini-title').textContent  = t.title  || 'Unknown';
  document.getElementById('mini-artist').textContent = t.artist || '—';
  document.getElementById('np-title').textContent    = t.title  || 'Unknown';
  document.getElementById('np-artist').textContent   = t.artist || '—';
  document.getElementById('np-blur').style.backgroundImage = th ? `url(${th})` : '';
  updateHeartUI();
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title || '', artist: t.artist || '',
      artwork: [{src: th, sizes:'512x512', type:'image/jpeg'}]
    });
    navigator.mediaSession.setActionHandler('play',          () => activeAudio.play());
    navigator.mediaSession.setActionHandler('pause',         () => activeAudio.pause());
    navigator.mediaSession.setActionHandler('nexttrack',     next);
    navigator.mediaSession.setActionHandler('previoustrack', prev);
  }
}

    const data = await r.json();

      <div class="setting-row">
        <div>
          <div class="setting-label">Crossfade Duration</div>
          <div class="setting-sub" id="xfade-dur-label">${crossfadeDur}s</div>
        </div>
        <input type="range" min="1" max="12" step="1" value="${crossfadeDur}" style="width:100px;-webkit-appearance:none;height:4px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer" oninput="setCrossfadeDur(this.value)">
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Audio Quality</div>
          <div class="setting-sub">High quality streams when available</div>
        </div>
        <button class="sw on" id="sw-quality"></button>
      </div>
    </div>
    <div class="setting-group">
      <div class="sg-title">Region & Content</div>
      <div class="setting-row" onclick="openRegion()" style="cursor:pointer">
        <div>
          <div class="setting-label">Content Region</div>
          <div class="setting-sub" id="region-setting-sub">${REGIONS.find(r=>r.code===currentRegion)?.name || 'Global'}</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
    <div class="setting-group">
      <div class="sg-title">Lyrics</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Show Lyrics</div>
          <div class="setting-sub">From LRCLIB (free, no login)</div>
        </div>
        <button class="sw on"></button>
      </div>
    </div>
    <div class="setting-group">
      <div class="sg-title">About</div>
      <div class="setting-row">
        <div><div class="setting-label">Applify</div><div class="setting-sub">Version 2.0 · Powered by YouTube Music</div></div>
      </div>
      <div class="setting-row" onclick="clearData()" style="cursor:pointer">
        <div><div class="setting-label" style="color:#ff453a">Clear All Data</div><div class="setting-sub">Remove history, likes, settings</div></div>
      </div>
    </div>`;
}

function toggleSetting(key) {
  if (key === 'crossfade') {
    isCrossfade = !isCrossfade;
    document.getElementById('sw-xfade').classList.toggle('on', isCrossfade);
    toast(isCrossfade ? '✅ Crossfade enabled' : 'Crossfade disabled');
  }
}

function setCrossfadeDur(v) {
  crossfadeDur = parseInt(v);
  document.getElementById('xfade-dur-label').textContent = v + 's';
}

function clearData() {
  if (confirm('Clear all Applify data?')) {
    localStorage.clear();
    location.reload();
  }
}

/* ── TOAST ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('in');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('in'), 2800);
}

/* ── UTILS ── */
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function enc(obj) { return JSON.stringify(JSON.stringify(obj)).replace(/'/g,"\\'"); }
</script>
